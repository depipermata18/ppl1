<script>
  let currentJurusanId = null;

  function showToast(message, type = 'info') {
    const icons = {
      success: 'fas fa-check-circle',
      error: 'fas fa-exclamation-triangle',
      info: 'fas fa-info-circle'
    };

    const toastContainer = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `
      <div class="toast-icon">
        <i class="${icons[type] || icons.info}"></i>
      </div>
      <div class="toast-content">${message}</div>
    `;
    toastContainer.appendChild(toast);

    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 400);
    }, 3500);
  }

  async function safeFetch(url, options = {}) {
    try {
      const response = await fetch(url, options);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const text = await response.text();
      if (!text.trim()) throw new Error("Respons kosong");
      return JSON.parse(text);
    } catch (error) {
      console.error("Fetch error:", error);
      throw error;
    }
  }

  async function updateUserInfo() {
    try {
      const res = await fetch('dashboard_admin_api.php');
      if (!res.ok) return;
      const data = await res.json();
      const avatar = document.getElementById('header-avatar');
      const username = document.getElementById('header-username');
      if (avatar && data.logged_in_foto_profil_path) {
        avatar.src = data.logged_in_foto_profil_path;
        avatar.onerror = () => avatar.src = 'images/profile.png';
      }
      if (username) {
        username.textContent = data.logged_in_username || 'Akun';
      }
    } catch (err) {
      console.error('Gagal update user:', err);
    }
  }

  function updateHeaderFromResponse(data) {
    updateUserInfo();
  }

  // ✅ FUNGSI BARU: BUKA MODAL UBAH WAKTU
  function openUbahWaktuModal() {
    if (!currentJurusanId) {
      showToast('Harap pilih jurusan terlebih dahulu.', 'error');
      return;
    }
    const modal = document.getElementById('ubahWaktuModal');
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
  }

  function closeUbahWaktuModal() {
    const modal = document.getElementById('ubahWaktuModal');
    modal.classList.remove('show');
    setTimeout(() => modal.style.display = 'none', 300);
  }

  // ✅ PROSES PERUBAHAN WAKTU
  async function prosesUbahWaktuSemuaSoal() {
    const wm = document.getElementById('ubah_waktu_mulai').value;
    const ws = document.getElementById('ubah_waktu_selesai').value;

    if (!wm || !ws) {
      showToast('Harap isi waktu mulai dan selesai.', 'error');
      return;
    }

    const checkedBoxes = document.querySelectorAll('.soal-checkbox:checked');
    let ids = [];

    if (checkedBoxes.length > 0) {
      ids = Array.from(checkedBoxes).map(cb => cb.value);
    } else {
      const allRows = document.querySelectorAll('tbody tr[data-id-soal]');
      if (allRows.length === 0) {
        showToast('Tidak ada soal di jurusan ini.', 'info');
        return;
      }
      ids = Array.from(allRows).map(row => row.dataset.idSoal);
    }

    try {
      const formData = new FormData();
      formData.append('action', 'update_time_bulk');
      formData.append('ids', JSON.stringify(ids));
      formData.append('waktu_mulai', wm);
      formData.append('waktu_selesai', ws);
      formData.append('id_jurusan', currentJurusanId);

      const result = await safeFetch('manajemen_soal.php', { method: 'POST', body: formData });

      if (result.success) {
        showToast(result.success, 'success');
        // Update tampilan
        ids.forEach(id => {
          const row = document.querySelector(`tr[data-id-soal="${id}"]`);
          if (row) {
            const waktuCell = row.querySelector('.waktu-cell');
            if (waktuCell) {
              const dt = new Date(wm);
              const dt2 = new Date(ws);
              waktuCell.innerHTML = `
                <small>${dt.toLocaleString('id-ID')} – ${dt2.toLocaleString('id-ID')}</small>
              `;
            }
          }
        });
        closeUbahWaktuModal();
      } else {
        showToast(result.error || 'Gagal memperbarui waktu.', 'error');
      }
    } catch (error) {
      showToast('Gagal menghubungi server.', 'error');
    }
  }

  // ✅ SISIPKAN TOMBOL DI ACTION BAR
  function injectUbahWaktuButton() {
    const actionBar = document.querySelector('.action-bar');
    if (!actionBar || document.getElementById('btn-ubah-waktu-jurusan')) return;

    const button = document.createElement('button');
    button.id = 'btn-ubah-waktu-jurusan';
    button.className = 'btn btn-update-time';
    button.innerHTML = '<i class="fas fa-clock"></i> Ubah Waktu Semua Soal';
    button.addEventListener('click', openUbahWaktuModal);
    actionBar.appendChild(button);
  }

  async function init() {
    try {
      const [headerRes, footerRes] = await Promise.all([
        fetch('includes/header.html'),
        fetch('includes/footer.html')
      ]);
      if (!headerRes.ok || !footerRes.ok) throw new Error('Gagal muat header/footer');
      document.getElementById('header-container').innerHTML = await headerRes.text();
      document.getElementById('footer-container').innerHTML = await footerRes.text();

      const urlParams = new URLSearchParams(window.location.search);
      const id_jurusan = urlParams.get('id_jurusan');
      if (id_jurusan) {
        currentJurusanId = id_jurusan;
      }

      const res = await fetch(id_jurusan 
        ? `manajemen_soal.php?id_jurusan=${id_jurusan}` 
        : 'manajemen_soal.php'
      );
      if (!res.ok) throw new Error('Gagal ambil data');
      const data = await res.json();
      
      updateHeaderFromResponse(data);
      document.getElementById('content').innerHTML = data.html;
      applyInteractive();
      setupEventListeners();

      if (currentJurusanId) {
        injectUbahWaktuButton(); // 🔥 Tambahkan tombol
      }
    } catch (err) {
      console.error('Error:', err);
      window.location.href = "login.html";
    }
  }

  function applyInteractive() {
    const selectors = ['.btn', '.btn-edit', 'tbody tr', '.jurusan-card'];
    selectors.forEach(sel => {
      document.querySelectorAll(sel).forEach(el => {
        el.classList.add('interactive');
      });
    });

    const tambahSoalBtn = document.querySelector('.btn-add');
    if (tambahSoalBtn && !tambahSoalBtn.classList.contains('gemoy-applied')) {
      tambahSoalBtn.classList.add('gemoy-applied');
      tambahSoalBtn.addEventListener('mouseenter', () => {
        tambahSoalBtn.style.transform = 'translateY(-6px) scale(1.05)';
      });
      tambahSoalBtn.addEventListener('mouseleave', () => {
        tambahSoalBtn.style.transform = 'translateY(0) scale(1)';
      });
      tambahSoalBtn.addEventListener('mousedown', () => {
        tambahSoalBtn.style.transform = 'translateY(0) scale(0.95)';
      });
      tambahSoalBtn.addEventListener('mouseup', () => {
        if (tambahSoalBtn.matches(':hover')) {
          tambahSoalBtn.style.transform = 'translateY(-6px) scale(1.05)';
        } else {
          tambahSoalBtn.style.transform = 'translateY(0) scale(1)';
        }
      });
    }
  }

  function setupEventListeners() {
    const selectAllCheckbox = document.getElementById('select-all');
    if (selectAllCheckbox) {
      selectAllCheckbox.addEventListener('change', function() {
        document.querySelectorAll('.soal-checkbox').forEach(checkbox => {
          checkbox.checked = this.checked;
        });
      });
    }
    document.querySelector('.btn-delete-selected')?.addEventListener('click', hapusTerpilih);
  }

  // ... (fungsi lain seperti closeModal, simpanSoal, hapusSoal, hapusTerpilih, importExcelSoal, dll tetap sama)

  function openModal() {
    const modal = document.getElementById('tambahSoalModal');
    if(currentJurusanId) {
      document.getElementById('form-id-jurusan').value = currentJurusanId;
    }
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
  }

  function closeModal() {
    const modal = document.getElementById('tambahSoalModal');
    modal.classList.remove('show');
    setTimeout(() => modal.style.display = 'none', 300);
    document.getElementById('form-tambah-soal').reset();
  }

  async function simpanSoal() {
    const form = document.getElementById('form-tambah-soal');
    const formData = new FormData(form);
    try {
      const result = await safeFetch('manajemen_soal.php', { method: 'POST', body: formData });
      if (result.success) {
        showToast(result.success, 'success');
        closeModal();
        init();
      } else {
        showToast(result.error || 'Terjadi kesalahan', 'error');
      }
    } catch (err) {
      showToast('Gagal menghubungi server', 'error');
    }
  }

  let pendingDeleteAction = null;

  function openHapusModal(message, warning = true, action) {
    pendingDeleteAction = action;
    document.getElementById('hapusModalMessage').textContent = message;
    document.getElementById('hapusModalWarning').style.display = warning ? 'block' : 'none';
    const modal = document.getElementById('hapusModal');
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
  }

  function closeHapusModal() {
    const modal = document.getElementById('hapusModal');
    modal.classList.remove('show');
    setTimeout(() => modal.style.display = 'none', 300);
    pendingDeleteAction = null;
  }

  document.getElementById('confirmHapusBtn').addEventListener('click', function() {
    if (pendingDeleteAction) pendingDeleteAction();
    closeHapusModal();
  });

  function hapusSoal(idSoal) {
  if (!idSoal) {
    showToast("Data soal tidak valid.", "error");
    return;
  }

  openHapusModal(
    "Apakah kamu yakin ingin menghapus soal ini? 😢",
    true,
    async () => {
      try {
        const result = await safeFetch('manajemen_soal.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `hapus_id=${encodeURIComponent(idSoal)}`
        });

        if (result.success) {
          showToast("Soal berhasil dihapus! 🥺✨", "success");
          const row = document.querySelector(`tr[data-id-soal="${idSoal}"]`);
          if (row) row.remove();
        } else {
          showToast(result.error || "Gagal menghapus soal.", "error");
        }
      } catch (error) {
        showToast("Terjadi kesalahan server. Coba lagi nanti.", "error");
      }
    }
  );
}

  async function hapusTerpilih() {
  const checkedBoxes = document.querySelectorAll('.soal-checkbox:checked');
  if (checkedBoxes.length === 0) {
    showToast('Pilih soal yang akan dihapus.', 'error');
    return;
  }

  openHapusModal(
    `Hapus ${checkedBoxes.length} soal terpilih?`,
    true,
    async () => {
      let successCount = 0;

      for (const checkbox of checkedBoxes) {
        const id = checkbox.value;
        try {
          const result = await safeFetch('manajemen_soal.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `hapus_id=${id}`
          });
          if (result.success) successCount++;
        } catch (e) {}
      }

      if (successCount > 0) {
        checkedBoxes.forEach(cb => {
          const row = cb.closest('tr');
          if (row) row.remove();
        });
        document.getElementById('select-all').checked = false;
        showToast(`Berhasil hapus ${successCount} soal.`, 'success');
      } else {
        showToast('Gagal menghapus soal.', 'error');
      }
    }
  );
}

  function openImportExcelModal() {
    if (currentJurusanId) {
      document.getElementById('import-id-jurusan').value = currentJurusanId;
    }
    const modal = document.getElementById('importExcelModal');
    modal.style.display = 'flex';
    setTimeout(() => modal.classList.add('show'), 10);
  }

  function closeImportExcelModal() {
    const modal = document.getElementById('importExcelModal');
    modal.classList.remove('show');
    setTimeout(() => modal.style.display = 'none', 300);
  }

  async function importExcelSoal() {
    const form = document.getElementById('form-import-excel');
    const formData = new FormData(form);
    try {
      const result = await safeFetch('import_soal_excel.php', { method: 'POST', body: formData });
      if (result.status === 'success') {
        showToast(`Berhasil import ${result.inserted} soal`, 'success');
        closeImportExcelModal();
        init();
      } else {
        showToast(result.message || 'Gagal import Excel', 'error');
      }
    } catch (err) {
      showToast('Gagal menghubungi server', 'error');
    }
  }

  document.addEventListener('DOMContentLoaded', init);

  window.onclick = function(e) {
    const modals = ['tambahSoalModal', 'importExcelModal', 'hapusModal', 'ubahWaktuModal'];
    modals.forEach(id => {
      const modal = document.getElementById(id);
      if (modal && e.target === modal) {
        if (id === 'ubahWaktuModal') closeUbahWaktuModal();
        else if (id === 'tambahSoalModal') closeModal();
        else if (id === 'importExcelModal') closeImportExcelModal();
        else closeHapusModal();
      }
    });
  };

  document.addEventListener('change', function (e) {
    if (e.target.id === 'gambar_soal') {
      const file = e.target.files[0];
      const preview = document.getElementById('previewGambarSoal');
      if (!file) {
        preview.style.display = 'none';
        return;
      }
      if (!file.type.startsWith('image/')) {
        showToast('File harus berupa gambar!', 'error');
        e.target.value = '';
        preview.style.display = 'none';
        return;
      }
      const reader = new FileReader();
      reader.onload = function (ev) {
        preview.src = ev.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });
</script>
